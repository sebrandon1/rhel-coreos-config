# Disable ICMP redirects — container hosts should not follow
# redirect routes from potentially compromised peers.
# CIS Benchmark: Ensure ICMP redirects are not accepted
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Disable source routing — attackers use source-routed packets
# to bypass network filtering.
# CIS Benchmark: Ensure source routed packets are not accepted
net.ipv4.conf.all.accept_source_route = 0

# Enable reverse path filtering — drops packets with spoofed
# source addresses that would not be routable via the incoming
# interface.
# CIS Benchmark: Ensure reverse path filtering is enabled
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Log martian packets — packets with impossible source addresses
# indicate scanning or spoofing attempts.
# CIS Benchmark: Ensure suspicious packets are logged
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Enable TCP SYN cookies — protects against SYN flood attacks
# with negligible overhead for legitimate connections.
# CIS Benchmark: Ensure TCP SYN Cookies is enabled
net.ipv4.tcp_syncookies = 1

# Ignore bogus ICMP error responses and broadcast pings.
# CIS Benchmark: Ensure bogus ICMP responses are ignored
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv4.icmp_echo_ignore_broadcasts = 1

# IPv6: Disable ICMP redirects.
# CIS Benchmark: Ensure IPv6 redirects are not accepted
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# IPv6: Disable router advertisements — managed infrastructure
# should not accept unsolicited RA messages.
# CIS Benchmark: Ensure IPv6 router advertisements are not accepted
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# IPv6: Disable source routing.
# CIS Benchmark: Ensure IPv6 source routed packets are not accepted
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
