# Identify audit log source by hostname for centralized log
# aggregation across multi-node clusters.
# CIS Benchmark: Ensure audit log source is identified
name_format = hostname

# Preserve audit logs under disk pressure — syslog action
# ensures events are forwarded before space exhaustion.
# CIS Benchmark: Ensure audit data retention is configured
space_left = 100
admin_space_left_action = syslog
disk_full_action = syslog
disk_error_action = syslog
